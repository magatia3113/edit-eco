    <script>
      // 기존 등급 표시 스크립트
      const grade = "{{ grade }}";
      const grades = ['A', 'B', 'C', 'D', 'E', 'F'];
      const gradeBar = document.getElementById('gradeBar');
      gradeBar.style.width = (grades.indexOf(grade) + 1) * 16.66 + '%';
      gradeBar.textContent = grade;
  
      switch (grade) {
        case 'A':
          gradeBar.classList.add('bg-success');
          break;
        case 'B':
          gradeBar.classList.add('bg-info');
          break;
        case 'C':
          gradeBar.classList.add('bg-primary');
          break;
        case 'D':
          gradeBar.classList.add('bg-warning');
          break;
        case 'E':
          gradeBar.classList.add('bg-orange');
          break;
        case 'F':
          gradeBar.classList.add('bg-danger');
          break;
      }
  
      // 예시 데이터 생성 (파이썬에서 만든 데이터와 유사하게)
      const existingData = Array.from({
        length: 25000
      }, () => d3.randomNormal(500, 100)());
  
      // 새로운 URL 데이터
      const newUrlData = 550;
  
      // SVG 크기 설정
      const svg = d3.select("svg");
      const margin = {
        top: 20,
        right: 20,
        bottom: 30,
        left: 40
      };
      const width = +svg.attr("width") - margin.left - margin.right;
      const height = +svg.attr("height") - margin.top - margin.bottom;
      const g = svg.append("g").attr("transform", `translate(${margin.left},${margin.top})`);
  
      // X축 및 Y축 범위 설정
      const x = d3.scaleLinear()
        .domain([d3.min(existingData), d3.max(existingData)])
        .rangeRound([0, width]);
  
      const bins = d3.histogram()
        .domain(x.domain())
        .thresholds(x.ticks(50))
        (existingData);
  
      const y = d3.scaleLinear()
        .domain([0, d3.max(bins, d => d.length)])
        .range([height, 0]);
  
      // X축
      g.append("g")
        .attr("class", "axis axis--x")
        .attr("transform", `translate(0,${height})`)
        .call(d3.axisBottom(x));
  
      // Y축
      g.append("g")
        .attr("class", "axis axis--y")
        .call(d3.axisLeft(y));
  
      // 히스토그램 막대 추가
      g.selectAll(".bar")
        .data(bins)
        .enter().append("rect")
        .attr("class", "bar")
        .attr("x", d => x(d.x0))
        .attr("y", d => y(d.length))
        .attr("width", d => x(d.x1) - x(d.x0) - 1)
        .attr("height", d => height - y(d.length))
        .attr("fill", "steelblue");
  
      // 새로운 URL 데이터를 선으로 표시
      g.append("line")
        .attr("x1", x(newUrlData))
        .attr("x2", x(newUrlData))
        .attr("y1", 0)
        .attr("y2", height)
        .attr("stroke", "red")
        .attr("stroke-width", 2)
        .attr("stroke-dasharray", "4,4");
    </script>
